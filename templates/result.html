<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;

            background: linear-gradient(-45deg, #1b5e20, #43a047, #00c853, #2196f3, #7b1fa2);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        .blob1 { width:300px;height:300px;background:#00e676;top:10%;left:10%; }
        .blob2 { width:250px;height:250px;background:#2196f3;bottom:10%;right:10%; }
        .blob3 { width:200px;height:200px;background:#ff4081;top:50%;left:50%; }

        @keyframes float {
            0% {transform:translateY(0);}
            50% {transform:translateY(-40px);}
            100% {transform:translateY(0);}
        }

        .card {
            width: 650px;
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            z-index: 10;
        }

        h2 {
            text-shadow: 0 0 15px rgba(0,255,150,0.6);
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: rgba(0,0,0,0.4);
        }

        th, td {
            padding: 12px;
        }

        tr {
            transition: 0.3s;
        }

        tr:hover {
            transform: scale(1.02);
            background: rgba(255,255,255,0.15);
        }

        .top {
            background: rgba(0,255,150,0.2);
            font-weight: bold;
            border-left: 4px solid #00e676;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00e676, #00c853);
            box-shadow: 0 0 15px rgba(0,255,150,0.6);
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 25px rgba(0,255,150,1);
        }
    </style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

    <h2>🌿 Top Recommendations</h2>

    <p><b>Category:</b> {{ category }}</p>
    <p><b>Fragility:</b> {{ fragility }}</p>

    <table>
        <tr>
            <th>Material</th>
            <th>AI Score</th>
        </tr>

        {% for r in results %}
        <tr class="{% if loop.index == 1 %}top{% endif %}">
            <td>{{ r.material_name }} {% if loop.index == 1 %}🏆{% endif %}</td>
            <td>{{ "%.2f"|format(r.predicted_score) }}</td>
        </tr>
        {% endfor %}
    </table>

    <form action="/home">
        <button>⬅ Back</button>
    </form>
</div>

</body>
</html>
